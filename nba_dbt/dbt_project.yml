name: "nba_dbt"
version: "1.0.0"
config-version: 2

profile: "nba_dbt"

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  nba_dbt:
    silver:
      +materialized: table
      +schema: nba_silver
    gold:
      +materialized: table
      +schema: nba_gold
